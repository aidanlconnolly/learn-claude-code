// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════
const STORAGE_KEY = 'ccl_journey_v1';

function getProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}

function saveProgress(p) { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }

// `lessonCount` is the unit's actual number of lessons. Stored progress is
// padded/truncated to that length so units can have any number of lessons
// (the engine no longer assumes 3). Falls back to the stored length, then 3.
function getLessonsDone(skillId, lessonCount) {
  const p = getProgress();
  const stored = p[skillId]?.done || [];
  const n = lessonCount || stored.length || 3;
  return Array.from({ length: n }, (_, i) => !!stored[i]);
}

function markLessonDone(skillId, lessonIdx, lessonCount) {
  const p = getProgress();
  const n = lessonCount || (p[skillId]?.done?.length) || (lessonIdx + 1);
  if (!p[skillId]) p[skillId] = { done: [] };
  while (p[skillId].done.length < n) p[skillId].done.push(false);
  p[skillId].done[lessonIdx] = true;
  saveProgress(p);
}

function totalLessonsDone(arr) {
  const list = arr || SKILLS;
  const p = getProgress();
  return list.reduce((sum, sk) => sum + (p[sk.id]?.done || []).filter(Boolean).length, 0);
}

// ═══════════════════════════════════════════════════════════════════
// NAVIGATION STATE
// ═══════════════════════════════════════════════════════════════════
let currentTab = 'journey';
let curArray = SKILLS;
let curSkill = 0, curLesson = 0, curPage = 0;
let quizState = { qIdx: 0, answered: false, canContinue: false };
let nextBlocked = false;

function getTabArray(tab) {
  return tab === 'playbook' ? PLAYBOOK : SKILLS;
}

function switchTab(tab) {
  if (tab === currentTab) return;
  currentTab = tab;
  document.querySelectorAll('.tab-button').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  renderRoadmap();
}

// ═══════════════════════════════════════════════════════════════════
// ROADMAP RENDER
// ═══════════════════════════════════════════════════════════════════
function renderRoadmap() {
  const arr = getTabArray(currentTab);
  const done = totalLessonsDone(arr);
  const totalLessons = arr.reduce((sum, sk) => sum + sk.lessons.length, 0);
  document.getElementById('nav-progress').textContent =
    `${done} of ${totalLessons} lessons done`;

  const hero = document.getElementById('road-hero');
  hero.innerHTML = currentTab === 'playbook'
    ? '<h1>Claude Code <em>Playbook</em></h1><p>Everything I\'ve actually done — install, accounts, deploy skills, and the projects I built to learn. Follow it top to bottom.</p>'
    : '<h1>Your <em>Skills Journey</em></h1><p>Eight skills that unlock everything. Complete lessons in order or jump ahead — your progress saves automatically.</p>';

  const container = document.getElementById('skill-nodes');
  container.innerHTML = arr.map((sk, i) => {
    const ld = getLessonsDone(sk.id, sk.lessons.length);
    const doneCount = ld.filter(Boolean).length;
    const allDone = doneCount === sk.lessons.length;
    const anyDone = doneCount > 0;
    const stateClass = allDone ? 's-complete' : anyDone ? 's-active' : '';
    const dots = ld.map((d, di) =>
      `<div class="ldot${d ? ' done' : di === doneCount ? ' partial' : ''}"></div>`).join('');
    const btnClass = allDone ? 'btn-review' : anyDone ? 'btn-continue' : 'btn-start';
    const btnText = allDone ? 'Review ✓' : anyDone ? `Continue — Lesson ${doneCount+1}` : 'Start →';
    return `<div class="skill-row">
      <div class="skill-card ${stateClass}">
        <div class="skill-top">
          <div class="skill-icon ${sk.iconBg}">${sk.icon}</div>
          <div class="skill-meta">
            <div class="skill-title">${sk.title}</div>
            <span class="skill-badge ${sk.badgeClass}">${sk.badge}</span>
          </div>
        </div>
        <p class="skill-tagline">${sk.tagline}</p>
        <div class="lesson-dots">${dots}</div>
        <button class="skill-btn ${btnClass}" onclick="openSkill(${i})">${btnText}</button>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════════
// LESSON VIEW
// ═══════════════════════════════════════════════════════════════════
function openSkill(skillIdx) {
  curArray = getTabArray(currentTab);
  curSkill = skillIdx;
  const ld = getLessonsDone(curArray[skillIdx].id, curArray[skillIdx].lessons.length);
  curLesson = ld.indexOf(false);
  if (curLesson === -1) curLesson = 0;
  curPage = 0;
  showLessonView();
}

function showLessonView() {
  document.getElementById('roadmap-view').style.display = 'none';
  const lv = document.getElementById('lesson-view');
  lv.classList.add('open');
  renderLessonView();
  window.scrollTo(0, 0);
}

function backToRoadmap() {
  document.getElementById('lesson-view').classList.remove('open');
  document.getElementById('roadmap-view').style.display = 'block';
  renderRoadmap();
  window.scrollTo(0, 0);
}

function switchLesson(idx) {
  curLesson = idx;
  curPage = 0;
  renderLessonView();
}

function renderLessonView() {
  const skill = curArray[curSkill];
  const lesson = skill.lessons[curLesson];
  const page = lesson.pages[curPage];
  const totalPages = lesson.pages.length;
  const ld = getLessonsDone(skill.id, skill.lessons.length);

  // Header
  document.getElementById('ls-skill-lbl').textContent = skill.title;
  document.getElementById('ls-title-lbl').textContent = lesson.title;

  // Page dots
  const pgDots = document.getElementById('pg-dots');
  pgDots.innerHTML = Array.from({length: totalPages}, (_, i) =>
    `<div class="pgdot${i < curPage ? ' done' : i === curPage ? ' cur' : ''}"></div>`
  ).join('');

  // Lesson picker bar
  const bar = document.getElementById('lesson-picker-bar');
  bar.innerHTML = skill.lessons.map((l, i) =>
    `<button class="lpick-btn${i === curLesson ? ' active' : ''}${ld[i] ? ' ldone' : ''}" onclick="switchLesson(${i})">
      ${ld[i] ? '✓ ' : ''}Lesson ${i+1}
    </button>`
  ).join('');

  // Footer meta
  document.getElementById('foot-meta').textContent =
    `Lesson ${curLesson + 1} of ${skill.lessons.length}  ·  Page ${curPage + 1} of ${totalPages}`;

  // Prev button
  const prevBtn = document.getElementById('btn-prev');
  prevBtn.disabled = curLesson === 0 && curPage === 0;

  // Next button
  const nextBtn = document.getElementById('btn-next');
  const isLastPage = curPage === totalPages - 1;
  const isLastLesson = curLesson === skill.lessons.length - 1;
  nextBlocked = page.type === 'quiz';
  nextBtn.disabled = nextBlocked;
  if (isLastPage && isLastLesson) {
    nextBtn.textContent = 'Complete Skill ✓';
    nextBtn.className = 'btn-next finish';
  } else if (isLastPage) {
    nextBtn.textContent = 'Next Lesson →';
    nextBtn.className = 'btn-next';
  } else {
    nextBtn.textContent = 'Next →';
    nextBtn.className = 'btn-next';
  }

  // Content
  const content = document.getElementById('lesson-content');
  content.innerHTML = renderPage(page);
  content.classList.remove('animate-in');
  void content.offsetWidth;
  content.classList.add('animate-in');

  // Post-render
  if (page.type === 'terminal') {
    const termId = `term-${curSkill}-${curLesson}-${curPage}`;
    animateTerminal(termId, page.lines);
  }
  if (page.type === 'quiz') {
    setupQuiz(page.questions);
  }
}

// ═══════════════════════════════════════════════════════════════════
// PAGE RENDER
// ═══════════════════════════════════════════════════════════════════
function renderPage(page) {
  switch (page.type) {
    case 'info': return renderInfo(page);
    case 'terminal': return renderTerminal(page);
    case 'code': return renderCode(page);
    case 'quiz': return renderQuiz(page);
    default: return '<p>Unknown page type.</p>';
  }
}

function renderInfo(page) {
  let html = `<h2 class="pg-heading">${page.heading}</h2>`;
  if (page.body) {
    page.body.forEach(p => { html += `<p class="pg-body">${p}</p>`; });
  }
  if (page.tip) {
    html += `<div class="tip-box"><div class="tip-lbl">${page.tip.label}</div><div class="tip-body">${page.tip.body}</div></div>`;
  }
  if (page.keyPoint) {
    html += `<div class="key-point"><div class="kp-lbl">Key Point</div><div class="kp-body">${page.keyPoint.body}</div></div>`;
  }
  if (page.breakdown) {
    html += `<div class="bdlist">${page.breakdown.map(b =>
      `<div class="bditem"><span class="bdcmd">${b.cmd}</span><span class="bddesc">${b.desc}</span></div>`
    ).join('')}</div>`;
  }
  if (page.steps) {
    html += `<div class="steps">${page.steps.map((s, i) =>
      `<div class="step"><div class="step-n">${i+1}</div><div class="step-txt"><div class="step-title">${s.title}</div><div class="step-desc">${s.desc}</div></div></div>`
    ).join('')}</div>`;
  }
  return html;
}

function renderTerminal(page) {
  const termId = `term-${curSkill}-${curLesson}-${curPage}`;
  let html = `<h2 class="pg-heading">${page.heading}</h2>`;
  if (page.intro) html += `<p class="term-intro">${page.intro}</p>`;
  html += `<div class="term-window">
    <div class="term-bar">
      <span class="td td-r"></span><span class="td td-y"></span><span class="td td-g"></span>
      <span class="term-title">Terminal</span>
    </div>
    <div class="term-body" id="${termId}"><span class="t-cursor"></span></div>
  </div>`;
  if (page.explain) {
    html += `<div class="term-explain"><p>${page.explain}</p></div>`;
  }
  return html;
}

function renderCode(page) {
  let html = `<h2 class="pg-heading">${page.heading}</h2>`;
  html += `<div class="code-block"><div class="code-hdr">${page.lang}</div><pre>${page.code}</pre></div>`;
  if (page.explain) html += `<p class="pg-body" style="margin-top:8px">${page.explain}</p>`;
  return html;
}

function renderQuiz(page) {
  quizState = { qIdx: 0, answered: false, canContinue: false };
  const q = page.questions[0];
  return `<h2 class="pg-heading">${page.heading}</h2>
    <div class="quiz-prog" id="quiz-prog">Question 1 of ${page.questions.length}</div>
    <div class="quiz-q" id="quiz-q">${q.q}</div>
    <div class="quiz-opts" id="quiz-opts">
      ${q.options.map((o, i) => `<button class="qopt" onclick="answerQuiz(${i})">${o}</button>`).join('')}
    </div>
    <div class="quiz-fb" id="quiz-fb"></div>
    <button class="quiz-cont" id="quiz-cont" onclick="nextQuizQuestion()">Next question →</button>`;
}

// ═══════════════════════════════════════════════════════════════════
// QUIZ LOGIC
// ═══════════════════════════════════════════════════════════════════
function setupQuiz(questions) {
  quizState = { qIdx: 0, answered: false, questions };
}

function answerQuiz(optionIdx) {
  if (quizState.answered) return;
  const questions = getCurrentPage().questions;
  const q = questions[quizState.qIdx];
  const opts = document.querySelectorAll('.qopt');
  const fb = document.getElementById('quiz-fb');
  const cont = document.getElementById('quiz-cont');

  quizState.answered = true;

  opts.forEach((opt, i) => {
    if (i === q.correct) opt.classList.add('correct');
    else if (i === optionIdx && optionIdx !== q.correct) opt.classList.add('wrong');
    else opt.classList.add('dim');
  });

  const isCorrect = optionIdx === q.correct;
  fb.className = `quiz-fb show ${isCorrect ? 'ok' : 'no'}`;
  fb.textContent = (isCorrect ? '✓ ' : '✗ ') + q.fb;

  const isLast = quizState.qIdx === questions.length - 1;
  if (isLast) {
    // Unlock Next
    document.getElementById('btn-next').disabled = false;
    nextBlocked = false;
    cont.style.display = 'none';
  } else {
    cont.textContent = 'Next question →';
    cont.className = 'quiz-cont show';
  }
}

function nextQuizQuestion() {
  const questions = getCurrentPage().questions;
  quizState.qIdx++;
  quizState.answered = false;
  const q = questions[quizState.qIdx];
  document.getElementById('quiz-prog').textContent = `Question ${quizState.qIdx + 1} of ${questions.length}`;
  document.getElementById('quiz-q').innerHTML = q.q;
  document.getElementById('quiz-opts').innerHTML = q.options.map((o, i) =>
    `<button class="qopt" onclick="answerQuiz(${i})">${o}</button>`).join('');
  document.getElementById('quiz-fb').className = 'quiz-fb';
  document.getElementById('quiz-cont').className = 'quiz-cont';
}

function getCurrentPage() {
  return curArray[curSkill].lessons[curLesson].pages[curPage];
}

// ═══════════════════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════════════════
function nextPage() {
  if (nextBlocked) return;
  const skill = curArray[curSkill];
  const lesson = skill.lessons[curLesson];
  const totalPages = lesson.pages.length;
  const isLastPage = curPage === totalPages - 1;
  const isLastLesson = curLesson === skill.lessons.length - 1;

  if (isLastPage) {
    markLessonDone(skill.id, curLesson, skill.lessons.length);
    if (isLastLesson) {
      backToRoadmap();
    } else {
      curLesson++;
      curPage = 0;
      renderLessonView();
    }
  } else {
    curPage++;
    renderLessonView();
  }
}

function prevPage() {
  if (curPage > 0) {
    curPage--;
    renderLessonView();
  } else if (curLesson > 0) {
    curLesson--;
    const lesson = curArray[curSkill].lessons[curLesson];
    curPage = lesson.pages.length - 1;
    renderLessonView();
  }
}

// ═══════════════════════════════════════════════════════════════════
// TERMINAL ANIMATION
// ═══════════════════════════════════════════════════════════════════
function animateTerminal(id, lines) {
  const container = document.getElementById(id);
  if (!container) return;
  container.innerHTML = '';
  let i = 0;

  function next() {
    if (i >= lines.length) return;
    const line = lines[i++];

    if (line.prompt) {
      const span = document.createElement('span');
      span.className = 'tl';
      const prompt = document.createElement('span');
      prompt.className = 't-prompt';
      prompt.textContent = '$ ';
      const cmd = document.createElement('span');
      cmd.className = 't-cmd';
      span.appendChild(prompt);
      span.appendChild(cmd);
      container.appendChild(span);

      let c = 0;
      const text = line.text;
      function typeChar() {
        if (c < text.length) {
          cmd.textContent += text[c++];
          setTimeout(typeChar, 52);
        } else {
          setTimeout(next, 320);
        }
      }
      typeChar();
    } else {
      const span = document.createElement('span');
      span.className = 'tl t-out';
      span.textContent = line.text;
      container.appendChild(span);
      setTimeout(next, line.text === '' ? 60 : 90);
    }
  }

  setTimeout(next, 200);
}

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════
renderRoadmap();
</script>
