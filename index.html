<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learn Claude Code — Skills Journey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0d1b2a; --navy-mid: #1a2e44; --navy-light: #243b55;
      --gold: #c9a84c; --gold-light: #e8c96a; --gold-pale: #fdf6e3;
      --green: #2ecc71; --green-dark: #27ae60; --red: #e74c3c;
      --white: #ffffff; --gray-100: #f4f6f9; --gray-200: #e8ecf1;
      --gray-400: #9aa3b0; --gray-600: #5a6577; --text: #1a2236;
      --radius: 12px; --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(13,27,42,0.10);
      --shadow-lg: 0 8px 40px rgba(13,27,42,0.16);
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--gray-100); color: var(--text); line-height: 1.6; min-height: 100vh; }

    /* NAV */
    .top-nav { position: sticky; top: 0; z-index: 100; background: var(--navy); border-bottom: 2px solid var(--gold); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .nav-brand { font-size: 1rem; font-weight: 800; color: var(--white); }
    .nav-brand span { color: var(--gold); }
    .nav-meta { font-size: 0.8rem; color: var(--gray-400); }

    /* TAB BAR */
    .tab-bar { background: var(--navy-mid); border-bottom: 1px solid var(--navy-light); padding: 0 24px; display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; }
    .tab-button { background: transparent; border: none; color: rgba(255,255,255,0.55); font-family: 'Inter', sans-serif; font-size: 0.88rem; font-weight: 600; padding: 14px 18px; cursor: pointer; border-bottom: 3px solid transparent; transition: color 0.15s, border-color 0.15s; margin-bottom: -1px; white-space: nowrap; }
    .tab-button:hover { color: var(--gold-light); }
    .tab-button.active { color: var(--gold); border-bottom-color: var(--gold); }

    /* ROADMAP HERO */
    .road-hero { background: var(--navy); padding: 48px 24px 56px; text-align: center; }
    .road-hero h1 { font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 800; color: var(--white); margin-bottom: 10px; }
    .road-hero h1 em { font-style: normal; color: var(--gold); }
    .road-hero p { font-size: 1rem; color: var(--gray-400); max-width: 480px; margin: 0 auto; }

    /* PATH */
    .path-wrapper { max-width: 720px; margin: 0 auto; padding: 52px 24px 80px; position: relative; }
    .path-spine { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; transform: translateX(-50%); background: repeating-linear-gradient(to bottom, rgba(201,168,76,0.4) 0, rgba(201,168,76,0.4) 10px, transparent 10px, transparent 20px); z-index: 0; pointer-events: none; }
    .skill-row { display: flex; margin-bottom: 52px; position: relative; z-index: 1; }
    .skill-row:nth-child(odd) { justify-content: flex-start; }
    .skill-row:nth-child(even) { justify-content: flex-end; }

    /* SKILL CARD */
    .skill-card { width: 300px; background: var(--white); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); border: 2px solid transparent; transition: transform 0.2s, box-shadow 0.2s; }
    .skill-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
    .skill-card.s-complete { border-color: var(--green); }
    .skill-card.s-active { border-color: var(--gold); animation: pulse-gold 2.5s ease infinite; }
    @keyframes pulse-gold { 0%,100% { box-shadow: var(--shadow); } 50% { box-shadow: 0 0 0 6px rgba(201,168,76,0.15), var(--shadow); } }

    .skill-top { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 10px; }
    .skill-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; flex-shrink: 0; }
    .bg-gold { background: rgba(201,168,76,0.15); }
    .bg-blue { background: rgba(52,152,219,0.12); }
    .bg-gray { background: var(--gray-200); }

    .skill-meta { flex: 1; }
    .skill-title { font-size: 0.95rem; font-weight: 700; color: var(--navy); margin-bottom: 4px; line-height: 1.3; }
    .skill-badge { display: inline-block; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 2px 7px; border-radius: 4px; }
    .badge-gold { background: rgba(201,168,76,0.18); color: #8a6f24; }
    .badge-blue { background: rgba(52,152,219,0.14); color: #2176ae; }
    .badge-gray { background: var(--gray-200); color: var(--gray-600); }

    .skill-tagline { font-size: 0.8rem; color: var(--gray-600); margin: 10px 0 12px; line-height: 1.5; }

    .lesson-dots { display: flex; gap: 6px; margin-bottom: 14px; }
    .ldot { width: 10px; height: 10px; border-radius: 50%; background: var(--gray-200); transition: background 0.3s; }
    .ldot.done { background: var(--green); }
    .ldot.partial { background: var(--gold); }

    .skill-btn { width: 100%; padding: 10px; border: none; border-radius: var(--radius-sm); font-family: 'Inter', sans-serif; font-size: 0.88rem; font-weight: 700; cursor: pointer; transition: background 0.15s; }
    .btn-start { background: var(--gold); color: var(--navy); }
    .btn-start:hover { background: var(--gold-light); }
    .btn-continue { background: var(--navy); color: var(--white); }
    .btn-continue:hover { background: var(--navy-light); }
    .btn-review { background: var(--green); color: var(--white); }
    .btn-review:hover { background: var(--green-dark); }

    /* LESSON VIEW */
    #lesson-view { display: none; min-height: 100vh; flex-direction: column; }
    #lesson-view.open { display: flex; }

    .lesson-hdr { background: var(--navy); border-bottom: 2px solid var(--gold); padding: 0 20px; height: 60px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
    .back-btn { background: none; border: none; color: var(--gold); font-weight: 700; font-size: 0.95rem; cursor: pointer; font-family: 'Inter', sans-serif; padding: 6px 0; transition: opacity 0.2s; white-space: nowrap; }
    .back-btn:hover { opacity: 0.7; }
    .lesson-hdr-titles { flex: 1; overflow: hidden; }
    .lesson-skill-lbl { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--gold); }
    .lesson-title-lbl { font-size: 0.9rem; font-weight: 700; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pg-dots { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
    .pgdot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: background 0.25s, transform 0.25s; }
    .pgdot.cur { background: var(--gold); transform: scale(1.35); }
    .pgdot.done { background: rgba(255,255,255,0.55); }

    /* Lesson picker bar */
    .lesson-picker-bar { background: var(--navy-mid); border-bottom: 1px solid var(--navy-light); padding: 8px 20px; display: flex; gap: 8px; flex-shrink: 0; }
    .lpick-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); background: transparent; color: rgba(255,255,255,0.5); font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .lpick-btn:hover { border-color: var(--gold); color: var(--gold); }
    .lpick-btn.active { background: var(--gold); border-color: var(--gold); color: var(--navy); }
    .lpick-btn.ldone { border-color: var(--green); color: var(--green); }
    .lpick-btn.active.ldone { background: var(--green); border-color: var(--green); color: var(--white); }

    .lesson-body { flex: 1; overflow-y: auto; padding: 32px 20px; display: flex; justify-content: center; }
    .lesson-inner { max-width: 620px; width: 100%; }

    .lesson-foot { background: var(--white); border-top: 1px solid var(--gray-200); padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-shrink: 0; }
    .foot-meta { font-size: 0.8rem; color: var(--gray-400); }
    .foot-btns { display: flex; gap: 10px; }
    .btn-prev { padding: 9px 20px; background: var(--gray-200); color: var(--gray-600); border: none; border-radius: var(--radius-sm); font-family: 'Inter', sans-serif; font-size: 0.88rem; font-weight: 700; cursor: pointer; transition: background 0.15s; }
    .btn-prev:hover:not(:disabled) { background: var(--gray-400); color: var(--white); }
    .btn-prev:disabled { opacity: 0.35; cursor: default; }
    .btn-next { padding: 9px 22px; background: var(--gold); color: var(--navy); border: none; border-radius: var(--radius-sm); font-family: 'Inter', sans-serif; font-size: 0.88rem; font-weight: 700; cursor: pointer; transition: background 0.15s; }
    .btn-next:hover { background: var(--gold-light); }
    .btn-next.finish { background: var(--green); color: var(--white); }
    .btn-next.finish:hover { background: var(--green-dark); }
    .btn-next:disabled { opacity: 0.4; cursor: default; }

    /* PAGE CONTENT */
    @keyframes fadeUp { from { opacity:0; transform: translateY(14px); } to { opacity:1; transform: translateY(0); } }
    .animate-in { animation: fadeUp 0.3s ease forwards; }

    .pg-heading { font-size: clamp(1.35rem, 3vw, 1.9rem); font-weight: 800; color: var(--navy); margin-bottom: 14px; line-height: 1.25; }
    .pg-heading .mono { font-family: 'Fira Code', monospace; color: var(--gold); }
    .pg-body { font-size: 0.97rem; color: var(--gray-600); line-height: 1.75; margin-bottom: 14px; }
    .pg-body strong { color: var(--text); }
    .pg-body code { font-family: 'Fira Code', monospace; background: var(--gray-200); padding: 1px 5px; border-radius: 3px; font-size: 0.88em; color: var(--navy); }

    .tip-box { background: var(--gold-pale); border-left: 4px solid var(--gold); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 14px 16px; margin: 18px 0; }
    .tip-lbl { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--gold); margin-bottom: 4px; }
    .tip-body { font-size: 0.88rem; color: var(--text); line-height: 1.6; }
    .tip-body code { font-family: 'Fira Code', monospace; background: rgba(201,168,76,0.2); padding: 1px 5px; border-radius: 3px; }

    .key-point { background: var(--navy); color: var(--white); border-radius: var(--radius); padding: 18px 22px; margin: 18px 0; }
    .kp-lbl { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--gold); margin-bottom: 6px; }
    .kp-body { font-size: 1rem; font-weight: 600; line-height: 1.5; }

    /* BREAKDOWN LIST */
    .bdlist { display: flex; flex-direction: column; gap: 10px; margin: 16px 0; }
    .bditem { display: flex; gap: 14px; align-items: flex-start; }
    .bdcmd { font-family: 'Fira Code', monospace; background: var(--navy); color: var(--gold-light); padding: 3px 10px; border-radius: var(--radius-sm); font-size: 0.85rem; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
    .bddesc { font-size: 0.88rem; color: var(--gray-600); line-height: 1.55; }
    .bddesc strong { color: var(--text); }

    /* STEPS */
    .steps { display: flex; flex-direction: column; gap: 14px; margin: 16px 0; }
    .step { display: flex; gap: 14px; align-items: flex-start; }
    .step-n { width: 30px; height: 30px; border-radius: 50%; background: var(--navy); color: var(--gold); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; flex-shrink: 0; }
    .step-txt .step-title { font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .step-txt .step-desc { font-size: 0.87rem; color: var(--gray-600); line-height: 1.5; }
    .step-txt .step-desc code { font-family: 'Fira Code', monospace; background: var(--gray-200); padding: 1px 5px; border-radius: 3px; font-size: 0.85em; color: var(--navy); }

    /* TERMINAL */
    .term-intro { font-size: 0.97rem; color: var(--gray-600); line-height: 1.7; margin-bottom: 18px; }
    .term-intro strong { color: var(--text); }
    .term-window { background: #0d1117; border-radius: var(--radius); overflow: hidden; margin: 0 0 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.28); }
    .term-bar { background: #21262d; padding: 9px 14px; display: flex; align-items: center; gap: 7px; }
    .td { width: 12px; height: 12px; border-radius: 50%; }
    .td-r { background: #ff5f57; } .td-y { background: #febc2e; } .td-g { background: #28c840; }
    .term-title { font-size: 0.75rem; color: #8b949e; margin-left: auto; font-family: 'Fira Code', monospace; }
    .term-body { padding: 18px 20px; font-family: 'Fira Code', monospace; font-size: 0.88rem; line-height: 1.9; min-height: 90px; }
    .tl { display: block; }
    .t-prompt { color: var(--gold); }
    .t-cmd { color: #e6edf3; }
    .t-out { color: #8b949e; }
    .t-cursor { display: inline-block; width: 7px; height: 0.9em; background: var(--gold); animation: blink 1s step-end infinite; vertical-align: text-bottom; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .term-explain { background: var(--navy-mid); border-radius: var(--radius-sm); padding: 14px 16px; margin-top: 4px; }
    .term-explain p { font-size: 0.87rem; color: var(--gray-400); line-height: 1.6; margin: 0; }
    .term-explain strong { color: var(--gold-light); }

    /* CODE BLOCK */
    .code-block { background: var(--navy); border-radius: var(--radius); overflow: hidden; margin: 16px 0; }
    .code-hdr { background: var(--navy-mid); padding: 7px 16px; font-size: 0.72rem; color: var(--gray-400); font-family: 'Fira Code', monospace; }
    .code-block pre { padding: 18px 20px; font-family: 'Fira Code', monospace; font-size: 0.83rem; color: #e6edf3; line-height: 1.75; overflow-x: auto; }
    .kw { color: #ff7b72; } .str { color: #a5d6ff; } .cm { color: #8b949e; font-style: italic; }
    .fn { color: #d2a8ff; } .num { color: #79c0ff; } .tag { color: #7ee787; } .attr { color: #79c0ff; }

    /* QUIZ */
    .quiz-q { font-size: 1.05rem; font-weight: 600; color: var(--text); margin-bottom: 18px; line-height: 1.55; }
    .quiz-prog { font-size: 0.78rem; color: var(--gray-400); margin-bottom: 16px; }
    .quiz-opts { display: flex; flex-direction: column; gap: 9px; }
    .qopt { padding: 13px 16px; border-radius: var(--radius-sm); border: 2px solid var(--gray-200); background: var(--white); font-family: 'Fira Code', monospace; font-size: 0.9rem; cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s; }
    .qopt:hover:not(.answered) { border-color: var(--gold); background: var(--gold-pale); }
    .qopt.correct { border-color: var(--green); background: rgba(46,204,113,0.09); color: var(--green-dark); pointer-events: none; }
    .qopt.wrong { border-color: var(--red); background: rgba(231,76,60,0.07); color: var(--red); pointer-events: none; }
    .qopt.dim { opacity: 0.4; pointer-events: none; }
    .quiz-fb { padding: 12px 14px; border-radius: var(--radius-sm); margin-top: 12px; font-size: 0.87rem; line-height: 1.5; display: none; }
    .quiz-fb.show { display: block; }
    .quiz-fb.ok { background: rgba(46,204,113,0.1); color: var(--green-dark); border: 1px solid var(--green); }
    .quiz-fb.no { background: rgba(231,76,60,0.07); color: var(--red); border: 1px solid var(--red); }
    .quiz-cont { margin-top: 14px; padding: 9px 20px; background: var(--navy); color: var(--white); border: none; border-radius: var(--radius-sm); font-family: 'Inter', sans-serif; font-weight: 700; cursor: pointer; display: none; }
    .quiz-cont.show { display: inline-block; }

    /* COMPLETE SCREEN */
    .complete-wrap { text-align: center; padding: 48px 0 24px; }
    .complete-icon { font-size: 3.5rem; margin-bottom: 14px; }
    .complete-h { font-size: 1.7rem; font-weight: 800; color: var(--navy); margin-bottom: 10px; }
    .complete-p { font-size: 0.97rem; color: var(--gray-600); max-width: 360px; margin: 0 auto 24px; line-height: 1.65; }
    .complete-xp { display: inline-block; background: var(--gold); color: var(--navy); font-weight: 700; font-size: 1rem; padding: 8px 24px; border-radius: 20px; }

    /* RESPONSIVE */
    @media (max-width: 640px) {
      .skill-row:nth-child(odd), .skill-row:nth-child(even) { justify-content: center; }
      .skill-card { width: 100%; max-width: 340px; }
      .path-spine { display: none; }
      .lesson-foot { flex-direction: column-reverse; }
      .foot-meta { display: none; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════ ROADMAP VIEW ═══════════════════════════ -->
<div id="roadmap-view">
  <nav class="top-nav">
    <div class="nav-brand">Learn <span>Claude Code</span></div>
    <div id="nav-progress" class="nav-meta">0 of 24 lessons done</div>
  </nav>
  <div class="tab-bar">
    <button class="tab-button active" data-tab="journey" onclick="switchTab('journey')">Learning Journey</button>
    <button class="tab-button" data-tab="playbook" onclick="switchTab('playbook')">Claude Code Playbook Setup</button>
  </div>
  <div class="road-hero" id="road-hero"></div>
  <div class="path-wrapper">
    <div class="path-spine"></div>
    <div id="skill-nodes"></div>
  </div>
</div>

<!-- ═══════════════════════════ LESSON VIEW ═══════════════════════════ -->
<div id="lesson-view">
  <nav class="top-nav lesson-hdr">
    <button class="back-btn" onclick="backToRoadmap()">← Roadmap</button>
    <div class="lesson-hdr-titles">
      <div id="ls-skill-lbl" class="lesson-skill-lbl"></div>
      <div id="ls-title-lbl" class="lesson-title-lbl"></div>
    </div>
    <div id="pg-dots" class="pg-dots"></div>
  </nav>
  <div class="lesson-picker-bar" id="lesson-picker-bar"></div>
  <div class="lesson-body">
    <div class="lesson-inner" id="lesson-content"></div>
  </div>
  <div class="lesson-foot">
    <div class="foot-meta" id="foot-meta"></div>
    <div class="foot-btns">
      <button class="btn-prev" id="btn-prev" onclick="prevPage()">← Back</button>
      <button class="btn-next" id="btn-next" onclick="nextPage()">Next →</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// SKILLS DATA
// ═══════════════════════════════════════════════════════════════════
const SKILLS = [
{
  id:'terminal', icon:'💻', title:'Terminal Commands', badge:'Game Changer', badgeClass:'badge-gold', iconBg:'bg-gold',
  tagline:'cd, ls, mkdir — you\'ll use these every session. Without them, you can\'t run Claude Code itself.',
  lessons:[
    { title:'Finding Your Way Around', pages:[
      { type:'info', heading:'What is the terminal?',
        body:[
          'The terminal is a text window into your computer. Instead of clicking icons to open folders, you type short commands. It sounds old-fashioned, but it\'s still how nearly all development tools work — including Claude Code.',
          'When you run Claude Code, you open a terminal, navigate to your project folder, and type <code>claude</code>. That\'s the whole setup. You don\'t need to be a command-line wizard — you just need three commands to feel at home.'
        ],
        tip:{ label:'The only three you need', body:'Master <code>pwd</code>, <code>ls</code>, and <code>cd</code> and you can navigate to any project on your computer. Everything else is optional.' }
      },
      { type:'terminal', heading:'<span class="mono">ls</span> — What\'s in this folder?',
        intro:'<strong>ls</strong> lists everything in your current folder. Run it any time you want to see what\'s around you.',
        lines:[
          { prompt:true, text:'ls' },
          { prompt:false, text:'Desktop/    Documents/  Downloads/' },
          { prompt:false, text:'projects/   README.md' },
          { prompt:false, text:'' },
          { prompt:true, text:'cd projects' },
          { prompt:true, text:'ls' },
          { prompt:false, text:'my-portfolio/    todo-app/    resume-site/' }
        ],
        explain:'Folders end with <strong>/</strong>. Files don\'t. After <code>cd projects</code> we moved into the projects folder, then <code>ls</code> showed what\'s inside it.'
      },
      { type:'terminal', heading:'<span class="mono">pwd</span> and <span class="mono">cd</span> — Where am I, and how do I move?',
        intro:'<strong>pwd</strong> (Print Working Directory) tells you your exact location. <strong>cd</strong> (Change Directory) moves you into a folder.',
        lines:[
          { prompt:true, text:'pwd' },
          { prompt:false, text:'/Users/yourname/projects' },
          { prompt:false, text:'' },
          { prompt:true, text:'cd my-portfolio' },
          { prompt:true, text:'pwd' },
          { prompt:false, text:'/Users/yourname/projects/my-portfolio' },
          { prompt:false, text:'' },
          { prompt:true, text:'cd ..' },
          { prompt:true, text:'pwd' },
          { prompt:false, text:'/Users/yourname/projects' }
        ],
        explain:'<strong>cd ..</strong> moves you one level up — back to the parent folder. Think of it like clicking the back button in a file browser.'
      }
    ]},
    { title:'Creating Things', pages:[
      { type:'terminal', heading:'<span class="mono">mkdir</span> — Create a folder',
        intro:'<strong>mkdir</strong> (Make Directory) creates a new folder instantly. This is how you start every new project.',
        lines:[
          { prompt:true, text:'mkdir my-portfolio' },
          { prompt:true, text:'ls' },
          { prompt:false, text:'my-portfolio/' },
          { prompt:false, text:'' },
          { prompt:true, text:'cd my-portfolio' },
          { prompt:true, text:'ls' },
          { prompt:false, text:'(empty — new folder is blank)' }
        ],
        explain:'No confirmation message means it worked. If there\'s an error you\'ll see it in red. Silence is success in the terminal.'
      },
      { type:'terminal', heading:'<span class="mono">touch</span> — Create a file',
        intro:'<strong>touch</strong> creates an empty file. Use it to stub out your project files before Claude fills them in.',
        lines:[
          { prompt:true, text:'touch index.html' },

{
  id:'pb-data', icon:'🗄️', title:'Add a Real Database & Login', badge:'Level Up', badgeClass:'badge-blue', iconBg:'bg-blue',
  tagline:'Graduate from "saved in this browser" to a real backend with accounts. The exact stack I use on every full app — Turso + Drizzle + per-user auth.',
  lessons:[
    { title:'Beyond localStorage', pages:[
      { type:'info', heading:'Where does your app\'s data actually live?',
        body:[
          'Tier 1 and Tier 2 apps store data in <code>localStorage</code> — a little box inside each visitor\'s browser. It\'s free, instant, and needs zero setup. That\'s why the finance tracker, the PGA picks, and the Amex maximizer all use it: the data is already private, because it never leaves your machine.',
          'But localStorage has hard limits. The data is stuck on one device — open the app on your phone and it\'s empty. Clear your browser cache and it\'s gone. And there\'s no way for two people to share the same data, or for you to see it from anywhere. The moment you want any of those things, you\'ve outgrown the browser and need a <strong>real database</strong>.'
        ],
        steps:[
          { title:'localStorage is enough when', desc:'The data only matters to one person on one device, and losing it would be annoying but not catastrophic. Personal trackers, single-player games, draft state.' },
          { title:'You need a real database when', desc:'Data must survive across devices, be shared between users, or be something you\'d be upset to lose. Anything with logins, anything multi-user, anything you\'d call "my account."' },
          { title:'The tell-tale prompt', desc:'The day you ask "can I log in on my laptop and see the same stuff as my phone?" — that\'s the day you need a backend.' }
        ],
        keyPoint:{ body:'localStorage = data trapped in one browser. A database = data that lives on a server and follows you everywhere. Don\'t add a database until you actually need one of those things — it\'s real complexity.' }
      },
      { type:'info', heading:'Pick your backend',
        body:[
          'There are three backends worth knowing as a beginner. They trade simplicity for power. For the apps I build, I default to <strong>Turso</strong> — it\'s SQLite in the cloud, dead simple, and has a generous free tier.'
        ],
        breakdown:[
          { cmd:'Turso (libSQL):', desc:'SQLite that lives in the cloud. What I actually use on every Next.js app. Tiny, fast, free to start, and you can run a local <code>file:local.db</code> copy for development. Pairs perfectly with Drizzle (next lesson).' },
          { cmd:'Supabase (Postgres):', desc:'The popular "Firebase alternative" — a full Postgres database plus built-in auth, file storage, and auto-generated APIs. More batteries included than Turso, more to learn. Reach for it if you want auth + storage handed to you.' },
          { cmd:'Vercel KV:', desc:'A simple key-value store (think one big shared dictionary). Great for tiny shared state — a leaderboard, a vote count — without a full database. The Stadium Run and penalty-shootout apps use it.' }
        ],
        tip:{ label:'How to choose', body:'Need rows, columns, and relationships (users, items, scores)? → a database (Turso or Supabase). Just need to stash a handful of shared values? → Vercel KV. Want auth + storage done for you and don\'t mind a bigger tool? → Supabase.' }
      },
      { type:'info', heading:'The prompt that adds a backend',
        body:[
          'You don\'t set up a database by hand. You describe what you want stored and let Claude scaffold the schema, the connection, and the queries. Be specific about the shape of your data — that\'s the part Claude can\'t guess.'
        ],
        breakdown:[
          { cmd:'Add Turso + Drizzle:', desc:'"Add a real database to this app using Turso (libSQL) and Drizzle ORM. I want to store [describe your data: e.g. tasks with a title, due date, and done flag]. Set up the schema, the db connection, and a local file:local.db for development. Walk me through getting a Turso URL and token."' },
          { cmd:'Migrate off localStorage:', desc:'"This app currently stores everything in localStorage. Move it to the Turso database we just set up — keep the same features working, just swap the storage layer underneath."' },
          { cmd:'If you prefer Supabase:', desc:'"Set this project up with Supabase instead. Create the table for [your data], wire up the client, and show me which environment variables I need to add in Vercel."' }
        ],
        keyPoint:{ body:'The schema — the list of tables and columns — is the one thing only you know. Spell it out in plain English and Claude builds the rest. Get the shape right up front; changing it later means a migration.' }
      }
    ]},
    { title:'Drizzle + Turso: your data layer', pages:[
      { type:'info', heading:'Drizzle = type-safe SQL in TypeScript',
        body:[
          'A database stores rows. <strong>Drizzle</strong> is the translator between your TypeScript code and those rows — an ORM (Object-Relational Mapper). You describe your tables once in a <code>schema.ts</code> file, and Drizzle gives you autocomplete and type-checking on every query, so a typo becomes a red squiggle instead of a 2am crash.',
          'You almost never write raw SQL. You write <code>db.select().from(items)</code> and Drizzle generates the SQL for you — correctly, every time.'
        ],
        steps:[
          { title:'schema.ts', desc:'One file that defines every table and column. The single source of truth for your data shape.' },
          { title:'db:push', desc:'One command that reads schema.ts and creates/updates the actual tables in Turso to match. This is a "migration."' },
          { title:'Queries', desc:'Type-safe functions — select, insert, update, delete — that read and write rows. Autocomplete knows your columns.' }
        ]
      },
      { type:'code', heading:'A real Drizzle schema', lang:'lib/db/schema.ts',
        code:`<span class="cm">// Each table is defined once, in TypeScript.</span>
import { sqliteTable, text, integer } from "drizzle-orm/sqlite-core";

<span class="cm">// One row per saved item, owned by a user</span>
export const items = sqliteTable("items", {
  id:        text("id").primaryKey(),
  userId:    text("user_id").notNull(),   <span class="cm">// the wall between users</span>
  title:     text("title").notNull(),
  amount:    integer("amount").notNull(),
  createdAt: text("created_at").notNull(),
});`,
        explain:'This is the exact pattern my real apps use (PeOps-Prep, Foundry, behavioral-prep). Notice <code>userId</code> on every per-user table — that one column is what keeps your data separate from everyone else\'s once you add logins. <code>text</code>, <code>integer</code>, and <code>real</code> are the column types; <code>.notNull()</code> means the column is required.'
      },
      { type:'terminal', heading:'Push the schema to the database',
        intro:'After Claude writes <code>schema.ts</code>, one command makes the real database match it. You run this whenever you add or change a table. <code>node</code> lives at <code>/opt/homebrew/bin</code> on a Mac, so the PATH prefix is there to make <code>npm</code> findable.',
        lines:[
          { prompt:true, text:'PATH=/opt/homebrew/bin:$PATH npm run db:push' },
          { prompt:false, text:'Reading schema from lib/db/schema.ts ...' },
          { prompt:false, text:'[✓] Pulling schema from database...' },
          { prompt:false, text:'Changes detected: + table "items" (5 columns)' },
          { prompt:false, text:'Applying changes to Turso ...' },
          { prompt:false, text:'[✓] Changes applied. Database is in sync.' }
        ],
        explain:'<strong>For local development</strong> you can point at a file instead of the cloud: set <code>TURSO_DATABASE_URL=file:local.db</code> and you get a real database in a single file on your Mac — no internet needed. When you deploy, you swap in the real Turso URL + auth token via Vercel\'s environment variables. <strong>If db:push fails</strong>, paste the error to Claude — it\'s almost always a missing env var or a column type mismatch it can fix in seconds.'
      }
    ]},
    { title:'Add per-user login', pages:[
      { type:'info', heading:'A shared database needs walls',
        body:[
          'Here\'s the catch nobody warns you about: the instant your data moves from localStorage to a shared server, it stops being private. Everyone who opens the app now reads from the <em>same</em> database. Without logins, your data and a stranger\'s data are in one pile.',
          'Authentication ("auth") is the wall. Each person makes an account, logs in, and from then on every query is scoped to <em>their</em> <code>userId</code>. You only need this once you have a shared backend — pure-localStorage apps are already private and need none of it.'
        ],
        keyPoint:{ body:'No login = everyone shares one bucket of data. The moment you have a real database AND more than one user, you need auth. That\'s the whole reason it exists.' }
      },
      { type:'info', heading:'The auth pattern I reuse everywhere',
        body:[
          'Every one of my full apps (the tutors, Foundry, PeOps-Prep, behavioral-prep) uses the same email/password setup. It\'s boring on purpose — boring auth is safe auth. You don\'t build this from scratch; Claude scaffolds it.'
        ],
        steps:[
          { title:'Passwords hashed with bcrypt', desc:'You never store the actual password — only a scrambled "hash." Even if the database leaks, the passwords are unreadable. bcryptjs handles this.' },
          { title:'Sessions signed with a JWT', desc:'After login, the server hands back a signed token (a JWT, via the jose library) proving "this is user X." The browser sends it with each request. AUTH_SECRET is the key that signs it — keep it secret.' },
          { title:'A route guard redirects strangers', desc:'A small file (proxy.ts) checks for a valid session on protected pages. No session → bounced to /login. This is the wall, enforced automatically.' },
          { title:'Every query scoped to the user', desc:'Each database query filters by the logged-in userId, so person A literally cannot fetch person B\'s rows.' }
        ]
      },
      { type:'terminal', heading:'Scaffold auth in one shot',
        intro:'I keep a script (<code>_scripts/add-auth.sh</code>) that drops the whole auth setup into any Next.js app — but you can just ask Claude to do the same thing. It installs the libraries, generates your AUTH_SECRET, and writes the login, register, and account pages.',
        lines:[
          { prompt:true, text:'./_scripts/add-auth.sh' },
          { prompt:false, text:'Installing jose + bcryptjs ...' },
          { prompt:false, text:'Generating AUTH_SECRET → .env.local' },
          { prompt:false, text:'+ lib/auth.ts  (session create/read/delete)' },
          { prompt:false, text:'+ proxy.ts     (route guard → /login)' },
          { prompt:false, text:'+ app/login, app/register, app/account pages' },
          { prompt:false, text:'Done. Now: add a userId column to each table.' }
        ],
        explain:'The script does the app-agnostic 80%. What\'s left is the part only you know: add a <code>users</code> table and a <code>userId</code> column to every per-user table, then scope each query to the logged-in user. <strong>The prompt to finish it:</strong> "Add a users table and a userId column to my existing tables, put requireAuth() at the top of every server action, and scope all queries to the current user. Write a migration that preserves my existing rows."'
      },
      { type:'quiz', heading:'Backend check',
        questions:[
          { q:'Your app stores data in localStorage. A friend opens it on their phone and sees nothing of yours. Why?',
            options:['The app is broken','localStorage is per-browser — your data never left your device','You forgot to deploy','The database is down'],
            correct:1,
            fb:'localStorage lives inside one browser on one device. Nothing is shared and nothing is on a server. That\'s great for privacy but useless the moment you want the same data across devices or users — which is when you move to a real database.'
          },
          { q:'You\'ve moved to a shared Turso database. What MUST you add before real users sign up?',
            options:['A faster server','Authentication, so each user\'s data is walled off by userId','More localStorage','A second database'],
            correct:1,
            fb:'A shared database means everyone reads from the same pile. Auth + a userId column on every table is the wall that keeps person A from seeing person B\'s rows. Without it, all data is effectively public to every visitor.'
          },
          { q:'What does Drizzle\'s schema.ts file give you?',
            options:['The live data itself','A single, type-checked definition of your tables and columns','Your API keys','The deployed URL'],
            correct:1,
            fb:'schema.ts is the source of truth for your data shape. Define tables once, run db:push to make the real database match, and get autocomplete + type-checking on every query so typos fail at edit-time, not in production.'
          }
        ]
      }
    ]}
  ]
},

  lessons:[
    { title:'The App Store reality check', pages:[
      { type:'info', heading:'Your web app cannot go on the App Store',
        body:[
          'This is the hard lesson everyone learns the painful way: <strong>a Next.js, Vite, or vanilla-HTML app cannot be submitted to the App Store.</strong> Apple rejects "thin web wrappers" — apps that are just a website in a shell. The App Store wants a real native binary.',
          'To get on the App Store you build with <strong>Expo / React Native</strong> instead — a framework that compiles your JavaScript UI into an actual native iOS app. It\'s the same language you already know (JS/React), just a different toolkit. Everything else in this lesson assumes an Expo app.'
        ],

          { cmd:'Ship a PWA:', desc:'Keep your web app as-is and make it an installable Progressive Web App — users tap "Add to Home Screen" and it behaves like an app. No App Store, no $99 fee, no review. Often all you actually need.' },

      },
      { type:'info', heading:'The prompt to start an Expo app',

          { prompt:false, text:'? Apple ID / 2FA ... ? Auto-generate signing credentials? Yes' },

      },
      { type:'info', heading:'The #1 cause of rejection: env vars',

        tip:{ label:'Set ios.supportsTablet: false up front', body:'Unless you genuinely want an iPad app, set <code>ios.supportsTablet: false</code> in app.json before your first build. Leaving it true secretly forces Apple to demand 13" iPad screenshots — which you discover at the very last "Add for Review" step. Flipping it later requires a whole new build.' }

    { title:'The App Store Connect gauntlet', pages:[
      { type:'info', heading:'The listing + screenshots',

      { type:'info', heading:'The 8 gotchas (the gold)',
        body:[
          'These are the traps that cost real hours shipping a real app. Read them once now; they\'ll save you a rejection later.'
        ],
        breakdown:[
          { cmd:'1. Run eas from the project folder', desc:'Not from your home directory (~). It reads app.json from the current folder.' },
          { cmd:'2. EAS env vars ≠ local files', desc:'Cloud builds can\'t see .env.local. Missing vars = backend off = rejection. Confirm the build log loaded them.' },

          { cmd:'5. The reviewer account must really log in', desc:'Test it yourself against the LIVE backend. Demo/localStorage logins fail once the real backend is on — the #1 rejection cause.' },
          { cmd:'6. --auto-submit needs ascAppId', desc:'Put the numeric App Store ID in eas.json or auto-submit errors after the build.' },
          { cmd:'7. "Newer Build Available" lies', desc:'It compares upload time, not content. Verify the build number ATTACHED to the version, then submit through it.' },
          { cmd:'8. The web UI hangs constantly', desc:'App Store Connect\'s SPA freezes. Re-navigate by URL to reset it, then click manually.' }
        ]
      },
      { type:'info', heading:'Submit — and let the skill drive',
        body:[
          'Final step: confirm the correct build is attached to your version, declare App Privacy honestly, set the age rating, then <strong>Add for Review → Submit</strong>. Apple\'s review takes 1–3 days.',
          'You don\'t have to memorize any of this. The entire runbook is the <code>/deploy-to-ios</code> slash command — Claude walks you through every step with the gotchas built in.'
        ],
        breakdown:[
          { cmd:'Kick off the whole thing:', desc:'Type <code>/deploy-to-ios</code> in Claude Code from your Expo project folder. It checks app.json, pushes env vars to EAS, runs the build, and guides you through App Store Connect.' },
          { cmd:'Hold your web deploy', desc:'If you have a website with an "App Store" badge, don\'t publish it until Apple actually RELEASES the app — the badge links to a dead page until then.' }
        ],
        keyPoint:{ body:'Almost everything is identical app-to-app. The only per-app variables are: bundle ID, name/subtitle/keywords/description, EXPO_PUBLIC_* vars, the App Store ID, screenshots, and the reviewer account. Nail those and the rest is mechanical.' }
      },
      { type:'quiz', heading:'App Store check',
        questions:[
          { q:'You built a great Next.js web app. Can you submit it to the App Store as-is?',
            options:['Yes, just zip it up','No — Apple rejects web wrappers; you rebuild the UI in Expo/React Native','Yes, if you pay extra','Only on Android'],
            correct:1,
            fb:'Apple rejects thin web wrappers. The App Store needs a real native binary, which means rebuilding the UI in Expo/React Native. Your alternative is shipping a PWA (Add to Home Screen) with no App Store listing at all.'
          },
          { q:'Your EAS build succeeds but the reviewer says login is broken. The most likely cause?',
            options:['The app is too big','Your environment variables weren\'t pushed to EAS — cloud builds can\'t read .env.local','Apple is having an outage','You used the wrong color scheme'],
            correct:1,
            fb:'Cloud builds read env vars from EAS only — never from your local .env.local. If you skip eas env:create, the build ships with the backend off, login fails, and Apple rejects it. This is the #1 rejection cause.'
          },
          { q:'Why set ios.supportsTablet: false before your first build?',
            options:['It makes the app faster','iPhones don\'t support tablets','Leaving it true secretly requires 13" iPad screenshots you\'ll discover at the last step','It\'s required by law'],
            correct:2,
            fb:'supportsTablet: true forces Apple to demand iPad screenshots — and you find out at the final "Add for Review" step. Set it false up front for an iPhone-only app; flipping it later means a brand-new build.'
          }
        ]
      }
    ]}
  ]
},
{
  id:'pb-prompt', icon:'🎯', title:'Prompt Like a Pro', badge:'Force Multiplier', badgeClass:'badge-gray', iconBg:'bg-gray',
  tagline:'The difference between fighting Claude and flying with it is how you ask. Spec-first prompting, steering mid-build, and the power patterns I lean on daily.',
  lessons:[
    { title:'Spec-first prompting', pages:[
      { type:'info', heading:'Context is the whole game',
        body:[
          'The single biggest predictor of a good result is how much context you give up front. A vague prompt forces Claude to guess — at your stack, your data shape, your style — and every guess is a chance to build the wrong thing.',
          'Think of yourself as the product manager, not the coder. Your job isn\'t to write code; it\'s to describe what "done" looks like clearly enough that there\'s nothing left to guess.'
        ],
        keyPoint:{ body:'Five extra minutes writing a complete prompt saves thirty minutes of "no, not like that." The most expensive prompts are the short, vague ones.' }
      },
      { type:'info', heading:'Vague vs. specific — the same request',
        body:[
          'Watch what specificity does. Both prompts ask for the same feature, but only one of them gets built right on the first try.'
        ],
        breakdown:[
          { cmd:'❌ Vague:', desc:'"Add a way to track expenses."' },
          { cmd:'✅ Specific:', desc:'"Add an expenses feature: a form with amount, category (dropdown: Food / Transport / Other), and date. Show all expenses in a list sorted newest-first, with a running total per category at the top. Store in the existing Turso db. Match the navy/gold styling already in the app."' }
        ],
        tip:{ label:'Why the second one wins', body:'The specific prompt answers every question Claude would otherwise guess: what fields, what categories, how to sort, where to store, how it looks. No guesses = no wrong turns = no back-and-forth.' }
      },
      { type:'info', heading:'The spec checklist',
        body:[
          'Before you hit enter on any "build me X" prompt, run through these five. You won\'t always need all of them, but the ones you skip are the ones Claude will guess at.'
        ],
        steps:[
          { title:'What — the feature', desc:'Describe the behavior in plain English. What can the user do, and what happens when they do it?' },
          { title:'Stack — the tools', desc:'"React + Vite + Tailwind," "vanilla HTML single file," "the existing Next.js app." This stops Claude from picking a stack you don\'t want.' },
          { title:'Data — the shape', desc:'What fields, what types, where it\'s stored. The one thing Claude genuinely cannot infer.' },
          { title:'Style — the look', desc:'Colors, layout, "match the existing design." Otherwise you get generic defaults.' },
          { title:'Constraints — the guardrails', desc:'"No external dependencies," "keep the API key server-side," "don\'t touch the other files."' }
        ]
      }
    ]},
    { title:'Steering the build', pages:[
      { type:'info', heading:'Plan first, then build',

          'In Claude Code you can enter Plan Mode (press Shift+Tab to cycle modes), or just say "make a plan first, don\'t write code yet."'
        ],
        breakdown:[
          { cmd:'Trigger a plan:', desc:'"Before you write any code, lay out your plan: which files you\'ll create or change and what each change does. Wait for my OK."' },
          { cmd:'Approve or redirect:', desc:'"Plan looks good except step 3 — don\'t add a new library, use the fetch we already have. Then go ahead."' }
        ],
        keyPoint:{ body:'The bigger the task, the more a plan pays off. For a sprawling feature, a 30-second plan review prevents Claude from building three files in the wrong direction.' }
      },
      { type:'info', heading:'Scope tightly, ship in small diffs',
        body:[
          'Claude works best on a tight scope. Two habits keep it focused: one project folder per session, and small, reviewable changes instead of giant ones.'
        ],
        steps:[
          { title:'One folder = the sandbox', desc:'Always cd into your specific project folder before starting. That folder becomes the boundary — Claude won\'t wander into other projects.' },
          { title:'Small diffs over big ones', desc:'"Add just the login form, nothing else yet" beats "build the whole auth system." Smaller changes are easier to review, verify, and undo if wrong.' },
          { title:'Commit at checkpoints', desc:'Ask Claude to commit when something works. A clean commit is a save point you can always roll back to.' }
        ],
        tip:{ label:'When Claude over-reaches', body:'If a change touched more than you wanted, say: "That\'s more than I asked for — revert everything except the part that does X." Small scope is recoverable; a sprawling change is a mess to untangle.' }
      },
      { type:'info', heading:'Course-correct without starting over',
        body:[
          'When Claude goes sideways, you don\'t restart — you steer. The trick is to be specific about what\'s wrong and what right looks like, the same way you were specific in the original spec.'
        ],
        breakdown:[
          { cmd:'Paste the actual error:', desc:'"This is failing. Here\'s the exact console error: [paste]. Diagnose and fix it." Never paraphrase an error — paste it verbatim.' },
          { cmd:'Name the wrong assumption:', desc:'"You assumed the data is an array, but it\'s an object keyed by id. Adjust for that."' },
          { cmd:'Redirect the approach:', desc:'"This works but it\'s overcomplicated. Rewrite it to use the existing useCredits hook instead of new state."' },
          { cmd:'Verify before trusting:', desc:'"Run the app and confirm the form actually submits and the list updates — don\'t just tell me it should work."' }
        ],
        keyPoint:{ body:'"Done" from Claude means "the code is written," not "the feature works." Ask it to verify — run the app, click the button, check the console — before you believe it.' }

    { title:'Power patterns', pages:[
      { type:'info', heading:'Send out subagents for big jobs',
        body:[

          'You rarely invoke these by hand. You just ask for the broad thing, and Claude fans the work out when it makes sense.'
        ],
        breakdown:[
          { cmd:'Broad exploration:', desc:'"Explore this codebase and tell me how data flows from the form to the database — which files are involved." Claude reads widely and hands back a map.' },
          { cmd:'Parallel audit:', desc:'"Check every component for places we call the API without error handling, and list them." Good for sweeps across many files at once.' }
        ]
      },
      { type:'info', heading:'Automate the repetitive with <span class="mono">/loop</span> and schedules',
        body:[
          'Some work is "do this, then check again later." Two tools cover that: <code>/loop</code> repeats a prompt on a timer in your current session, and scheduled tasks run a prompt automatically on a cron schedule (e.g. every morning) even when you\'re away.'

        breakdown:[

          { cmd:'/schedule — recurring agent:', desc:'"Every weekday at 8am, check my repo for failing tests and summarize them." Runs on its own schedule in the cloud.' }
        ],
        tip:{ label:'Don\'t reach for these too early', body:'Loops and schedules are for genuinely repetitive or time-delayed work. For a one-off task, just ask once — automation adds overhead that a single prompt doesn\'t need.' }
      },
      { type:'info', heading:'Connect outside tools with MCP & skills',
        body:[
          'Claude Code isn\'t limited to your files. <strong>MCP</strong> (Model Context Protocol) servers plug in outside tools — a browser, your calendar, Slack, a database — so Claude can act on them directly. And <strong>skills</strong> (the slash commands from the last playbook) are pre-built workflows you can extend with your own.'
        ],
        steps:[
          { title:'MCP = Claude\'s hands in other apps', desc:'Connect a server and Claude can read your calendar, drive a browser, query a database, post to Slack — whatever the server exposes.' },
          { title:'Skills = reusable workflows', desc:'Built-ins like /init, /code-review, /deploy-to-ios. You can also write your own for workflows you repeat.' },
          { title:'Plugins = bundles of both', desc:'Skills + MCP connectors packaged together, so a whole workflow installs in one step.' }
        ],
        keyPoint:{ body:'Prompting well is the foundation. MCP and skills are the multipliers — once your asks are clear, these let Claude act far beyond the code in your folder.' }
      },
      { type:'quiz', heading:'Prompting check',
        questions:[
          { q:'Which prompt is most likely to get the right result on the first try?',
            options:['"Make it better"','"Add a dark mode toggle in the top-right header that saves the choice to localStorage and defaults to the system preference"','"Fix the app"','"Add some features"'],
            correct:1,
            fb:'The specific prompt answers every question Claude would otherwise guess: what (a toggle), where (top-right header), behavior (saves to localStorage), and default (system preference). No guesses means no wrong turns.'
          },
          { q:'Claude says a feature is "done." What\'s the right next move?',
            options:['Deploy immediately','Ask it to actually run the app and verify the behavior works','Start the next feature','Trust it — Claude doesn\'t make mistakes'],
            correct:1,
            fb:'"Done" means the code is written, not that the feature works. Ask Claude to run the app and confirm the behavior — click the button, check the console — before you believe it. Verification is a separate step from writing code.'
          },
          { q:'You want to watch a deploy and be told the moment it goes live. Best tool?',
            options:['Refresh the page yourself every minute','<code>/loop</code> — re-run a check on a timer until it\'s done','Write a new app','Email Vercel support'],
            correct:1,
            fb:'/loop re-runs a prompt on an interval, so "every 5 minutes, check if the deploy is live" runs itself until it succeeds — exactly the polling-on-a-timer job it\'s built for.'
          }
        ]
      }
    ]}
  ]

{
  id:'pb-design', icon:'🎨', title:'Make It Look Good', badge:'Design Eye', badgeClass:'badge-blue', iconBg:'bg-blue',
  tagline:'You don\'t need to be a designer to ship something that looks professional. The handful of rules and the exact tools I use to make every app look intentional.',
  lessons:[
    { title:'Design without being a designer', pages:[
      { type:'info', heading:'Why your first draft looks "off"',
        body:[
          'Beginners assume good design means artistic talent. It doesn\'t — it\'s mostly a few mechanical rules applied consistently. The apps that look "off" almost always break the same handful: cramped spacing, too many colors, and no clear hierarchy.',
          'You don\'t even have to apply these yourself. Once you know the vocabulary, you can <em>direct</em> Claude — "increase the spacing," "establish a clearer hierarchy," "drop to one accent color" — and judge whether the result is right.'
        ],
        steps:[
          { title:'Space is your friend', desc:'The #1 amateur mistake is too little whitespace. Generous padding and margins make a layout feel calm and expensive. When in doubt, add space.' },
          { title:'Hierarchy guides the eye', desc:'One clear focal point per screen. Big bold headline, medium subheads, quiet body text. If everything shouts, nothing is heard.' },
          { title:'Restraint beats decoration', desc:'One accent color, one or two fonts, consistent corner radius. The navy + gold scheme across my apps is exactly this: a dark base and a single warm accent.' }
        ],
        keyPoint:{ body:'Good design is mostly subtraction. Consistent spacing + one accent color + clear hierarchy gets you 90% of the way to "this looks professional." Talent is the last 10%.' }
      },
      { type:'info', heading:'A reusable color system',
        body:[
          'Pros don\'t pick colors per-element — they define a small palette once and reuse it everywhere. That consistency is what reads as "designed." My apps store the palette as CSS variables (or Tailwind theme tokens) and never hardcode a hex value twice.'
        ],
        breakdown:[
          { cmd:'Base + surface:', desc:'A dark navy background, a slightly lighter "surface" for cards. Two shades of the same family, not two different colors.' },
          { cmd:'One accent:', desc:'Gold, used only for the things you want clicked — primary buttons, active states, key numbers. Scarcity is what makes an accent pop.' },
          { cmd:'Text shades:', desc:'Bright white for headings, a muted grey for body and captions. Same hue, different brightness.' }
        ],
        tip:{ label:'The prompt', body:'"Define a color system as CSS variables: a dark navy base, a lighter surface for cards, one gold accent for primary actions, and two text shades (bright + muted). Then refactor the app to use only those variables — no one-off hex codes."' }
      },
      { type:'info', heading:'Steal a starting point',
        body:[
          'You don\'t have to invent a look from scratch. Describe a <em>vibe</em> and a reference, and Claude gives you a coherent starting point you can then refine.'
        ],
        breakdown:[
          { cmd:'Set the vibe:', desc:'"Make this feel like a premium fintech app — dark, calm, lots of whitespace, one warm accent, rounded cards, subtle shadows."' },
          { cmd:'Borrow a reference:', desc:'"Style this like Linear / Stripe / Notion — clean, lots of breathing room, restrained color." Naming a well-known product gives Claude a clear target.' },
          { cmd:'Then iterate:', desc:'"The cards are too busy — more padding, remove the borders, let whitespace separate them instead."' }
        ],
        keyPoint:{ body:'Naming a reference product ("like Stripe") is the single most efficient design prompt — it carries a whole coherent style in two words.' }
      }
    ]},
    { title:'Tailwind + shadcn, the way I use them', pages:[
      { type:'info', heading:'Tailwind = styling in the markup',
        body:[
          'Every React app I build styles with <strong>Tailwind</strong> — utility classes you write directly on elements (<code>px-4 py-2 rounded-lg font-medium</code>) instead of separate CSS files. It feels verbose at first, then becomes the fastest way to style anything because you never leave the component.',
          'In Tailwind v4 (what the Amex Maximizer uses) there\'s no <code>tailwind.config.js</code> — your theme tokens live in an <code>@theme {}</code> block inside your CSS. That\'s where your color system from the last lesson plugs in.'
        ],
        steps:[
          { title:'Utility classes', desc:'Spacing (p-, m-), color (bg-, text-), layout (flex, grid), rounding (rounded-), and so on. Compose them right on the element.' },
          { title:'@theme tokens (v4)', desc:'Define --color-navy, --color-gold, fonts, etc. in @theme inside index.css. Then bg-navy and text-gold "just work" everywhere.' },
          { title:'Responsive prefixes', desc:'md:flex, lg:px-8 — apply a class only at a breakpoint. This is how one set of markup adapts to phone and desktop (next lesson).' }
        ]
      },
      { type:'code', heading:'shadcn/ui + the cn() helper', lang:'src/lib/utils.ts',
        code:`<span class="cm">// Every shadcn app ships this one helper — merges class lists cleanly.</span>
import { clsx } from "clsx";
import { twMerge } from "tailwind-merge";

export function cn(...inputs) {
  return twMerge(clsx(inputs));
}

<span class="cm">// Used to combine fixed + conditional classes without conflicts:</span>
&lt;button className={cn("rounded-lg px-4 py-2 font-medium",
  isActive &amp;&amp; "bg-gold text-navy")}&gt;
  Save
&lt;/button&gt;`,
        explain:'<strong>shadcn/ui</strong> isn\'t a component library you install and import — it <em>copies</em> styled, accessible components (Button, Card, Dialog, Badge) straight into your <code>src/components/ui/</code> so you own and can edit them. The <code>cn()</code> helper above is the glue: it lets you layer conditional classes (active states, variants) on top of base styles without Tailwind conflicts. Initialize it with <code>npx shadcn init</code>, then add pieces with <code>npx shadcn add button card</code>.'
      },
      { type:'info', heading:'When to reach for what',
        body:[
          'Not every project needs the full toolkit. Match the tool to the tier.'
        ],
        breakdown:[
          { cmd:'Single HTML file:', desc:'Plain CSS in a <code>&lt;style&gt;</code> block with CSS variables. No build step, no Tailwind. (This learning app is exactly that.)' },
          { cmd:'React/Vite or Next app:', desc:'Tailwind for everything, plus shadcn/ui for anything interactive (dialogs, dropdowns, forms) where accessibility is fiddly to get right by hand.' },
          { cmd:'The prompt:', desc:'"Set up Tailwind v4 with my color tokens in @theme, initialize shadcn/ui, and rebuild the buttons and cards using shadcn components."' }
        ],
        tip:{ label:'Don\'t over-tool a small thing', body:'A one-page site doesn\'t need shadcn or even Tailwind. Reaching for the heavy toolkit on a Tier-1 project is how a 20-minute build becomes a 2-hour setup. Match the tool to the size.' }
      }
    ]},
    { title:'Responsive & dark mode', pages:[
      { type:'info', heading:'Mobile-first is a mindset',
        body:[
          'Most people will open your link on a phone. If it only looks good on your laptop, it looks broken to half your visitors. "Mobile-first" means you design for the small screen first, then add breakpoints to <em>expand</em> for bigger screens — not the other way around.',
          'In Tailwind this is the unprefixed-class-is-mobile rule: <code>px-4</code> applies everywhere, and <code>md:px-8</code> overrides it only on medium screens and up.'
        ],
        steps:[
          { title:'Test narrow first', desc:'Resize your browser to ~380px wide. If it works there, widening it is easy. The reverse rarely is.' },
          { title:'Stack, then spread', desc:'Columns that sit side-by-side on desktop should stack vertically on mobile. <code>flex-col md:flex-row</code> is the whole trick.' },
          { title:'Tap targets', desc:'Buttons and links need to be big enough for a thumb — generous padding isn\'t just aesthetic on mobile, it\'s usability.' }
        ],
        keyPoint:{ body:'Always check your app at phone width before you call it done. "Looks great on my screen" is the most common way a shipped app looks broken to everyone else.' }
      },
      { type:'info', heading:'Dark mode and verifying the look',
        body:[
          'Dark mode is mostly free if you used a color system — you swap the base and text tokens and everything follows. And you don\'t have to eyeball any of this manually: Claude can drive the real app and check it for you.'
        ],
        breakdown:[
          { cmd:'Add dark mode:', desc:'"Add a dark/light toggle. Drive it with a CSS class on the root and my existing color tokens, default to the system preference, and remember the choice in localStorage."' },
          { cmd:'Verify responsiveness:', desc:'"Run the app, resize it to phone width, and screenshot it. Tell me anything that overflows, overlaps, or looks cramped." Claude uses the preview tools to actually look.' },
          { cmd:'Polish pass:', desc:'"Do a design polish pass: check spacing consistency, alignment, and that the accent color is used sparingly. Fix what\'s off."' }
        ],
        tip:{ label:'Make Claude look, not guess', body:'Ask Claude to screenshot the running app at different widths rather than describing what it "should" look like. Seeing the real render catches the overflow bug that reasoning misses.' }
      },
      { type:'quiz', heading:'Design check',
        questions:[
          { q:'Your app looks cramped and amateur. What\'s the single highest-impact fix?',
            options:['Add more colors','Add more whitespace — padding and margins','Use a fancier font','Add animations'],
            correct:1,
            fb:'Too little whitespace is the #1 tell of an amateur layout. Generous, consistent spacing makes everything feel calm and intentional. It beats new colors, fonts, or animation every time.'
          },
          { q:'What does shadcn/ui actually do when you "add" a component?',
            options:['Installs an npm package you import','Copies the component\'s source into your project so you own and can edit it','Loads it from a CDN','Generates it with AI each time'],
            correct:1,
            fb:'shadcn copies styled, accessible component source straight into your src/components/ui/ — you own the code and can edit it freely. That\'s why it pairs with the cn() helper instead of being a black-box library.'
          },
          { q:'In Tailwind, what does an unprefixed class like <code>px-4</code> (vs <code>md:px-4</code>) target?',
            options:['Only desktop','Only print','All screen sizes — it\'s the mobile-first base','Only dark mode'],
            correct:2,
            fb:'Unprefixed classes apply at every width — they\'re your mobile-first base. Prefixes like md: and lg: layer overrides on top for larger screens. That\'s the whole responsive model.'
          }
        ]
      }
    ]}
  ]
},
{
  id:'pb-workflow', icon:'🧰', title:'Work Like a Pro with Claude Code', badge:'Pro Habits', badgeClass:'badge-gold', iconBg:'bg-gold',
  tagline:'The habits that separate a smooth session from a frustrating one — managing context, using git as a safety net, and knowing when to push vs. start fresh.',
  lessons:[
    { title:'Manage context & memory', pages:[
      { type:'info', heading:'Claude forgets — design around it',
        body:[
          'Claude Code holds a limited window of conversation in its head. In a long session that window fills up, and old details get summarized or dropped. This isn\'t a flaw to fight — it\'s a constraint to design around, the same way you\'d manage any limited resource.',
          'Two facts follow from it: (1) put durable knowledge in files, not in chat, and (2) start a fresh session when you switch tasks, so the context isn\'t cluttered with irrelevant history.'
        ],
        steps:[
          { title:'CLAUDE.md = permanent memory', desc:'Anything Claude should know every session (stack, ports, conventions, deploy steps) goes in CLAUDE.md — it\'s reloaded every time. This is the memory that survives. (You set it up with /init.)' },
          { title:'The chat = working memory', desc:'Everything in the current conversation is temporary. Great for the task at hand, gone or fuzzy by next session.' },
          { title:'/clear between tasks', desc:'Finished a feature and moving to an unrelated one? Clear the conversation so stale context doesn\'t leak into the new task.' }
        ],
        keyPoint:{ body:'If you find yourself re-explaining the same thing every session, that\'s a sign it belongs in CLAUDE.md, not in the chat. Durable facts go in files; only the current task lives in the conversation.' }
      },
      { type:'info', heading:'Keep sessions focused',
        body:[
          'A focused session — one task, relevant context only — gets sharper results than a sprawling one where Claude is juggling six half-finished threads. You control the focus.'
        ],
        breakdown:[
          { cmd:'One task per session:', desc:'Finish or checkpoint a task, then /clear before the next unrelated one. A clean slate is faster than a cluttered one.' },
          { cmd:'Re-anchor when it drifts:', desc:'If a long session starts forgetting, restate the goal: "To recap: we\'re building X, we\'ve done Y, next is Z." A one-line refresh re-focuses it.' },
          { cmd:'Point at the source of truth:', desc:'"Re-read CLAUDE.md and lib/db/schema.ts before you start" beats hoping it remembers from an hour ago.' }
        ],
        tip:{ label:'Long task? Checkpoint and clear', body:'For a big multi-step job, finish a chunk, have Claude commit it (next lesson), then /clear and start the next chunk fresh with a pointer to what\'s done. Fresh context + a git checkpoint beats one marathon session.' }
      }
    ]},
    { title:'The git safety net', pages:[
      { type:'info', heading:'Git is your undo button',
        body:[
          'The single biggest fear for a non-coder is "what if Claude breaks something that was working?" Git removes that fear entirely. Every commit is a save point you can return to, so you can let Claude make bold changes knowing you can always roll back.',
          'You don\'t need to master git — you need three moves: commit when something works, check what changed, and revert when it doesn\'t. Claude runs all three for you.'
        ],
        steps:[
          { title:'Commit = save point', desc:'A commit snapshots every file at this moment with a label. "Commit this — it works" creates a point you can always return to.' },
          { title:'Diff = what changed', desc:'Before trusting a change, "show me what you changed" (the diff) lets you see exactly what moved — nothing is hidden.' },
          { title:'Revert = undo', desc:'"Undo the last change" or "go back to the last commit" rewinds to your last save point. The broken version simply disappears.' }
        ],
        keyPoint:{ body:'Commit early and often — every time something works, before you try something risky. A frequent committer is fearless, because the worst case is "go back to 10 minutes ago."' }
      },
      { type:'info', heading:'Branches = a sandbox to experiment',
        body:[
          'When you want to try something big or uncertain, a <strong>branch</strong> is a parallel copy where you can experiment freely. If it works, you keep it; if it doesn\'t, you throw the whole branch away and your main version was never touched.'
        ],
        breakdown:[
